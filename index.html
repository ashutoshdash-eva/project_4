<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 3</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #121212;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .avatar-gradient {
            background: linear-gradient(135deg, #6C5CE7, #00BFA6);
        }

        .neon-input {
            width: 90px !important;
            background-color: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #00ffc3 !important;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s ease;
        }

        .neon-input:focus {
            border-color: #00ffc3 !important;
            background-color: rgba(0, 0, 0, 0.5) !important;
            box-shadow: 0 0 8px rgba(0, 255, 195, 0.3) !important;
        }

        .neon-select {
            width: 120px !important;
            background-color: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #00ffc3 !important;
        }

        .neon-select option {
            background-color: #222;
            color: #fff;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #00BFA6, #6C5CE7);
            border: none;
            color: white;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0, 255, 195, 0.35);
            color: white;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
            margin-bottom: 0;
        }
    </style>
</head>

<body class="text-white">

    <!-- <a href="../index.html" class="btn btn-outline-light position-fixed bottom-0 start-50 translate-middle-x mb-4 rounded-pill px-4 glass-panel" style="z-index: 1000; text-decoration: none;">
        ← Back to Hub
    </a> -->

    <div class="position-fixed top-0 start-0 m-3 p-2 rounded-4 shadow d-flex align-items-center gap-3 glass-panel" style="z-index: 1000; min-width: 200px;">
        <div class="rounded-circle overflow-hidden d-flex justify-content-center align-items-center flex-shrink-0 avatar-gradient" style="width: 65px; height: 65px;">
            <img src="./Image/IMG_20260222_005742.png" alt="Ashutosh Dash" class="w-100 h-100 object-fit-cover" onerror="this.style.display='none'">
        </div>
        <div class="d-flex flex-column">
            <span class="fw-bold" style="font-size: 15px;">Ashutosh Dash</span>
            <span class="text-white-50" style="font-size: 12px;">Software Engineer - Configurator Developer</span>
        </div>
    </div>

    <div class="position-fixed top-0 end-0 m-3 p-4 rounded-4 glass-panel" style="width: 320px; z-index: 1000">
        <div class="d-flex flex-column gap-3">

            <div class="d-flex justify-content-between align-items-center">
                <label class="form-label">Shape</label>
                <select id="shapeType" class="form-select neon-select text-center shadow-none">
                    <option value="rect">Rectangle</option>
                    <option value="tri">Triangle</option>
                    <option value="cyl">Cylinder</option>
                </select>
            </div>

            <div id="rectInputs">
                <div class="d-flex flex-column gap-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label">Width</label>
                        <input type="number" id="width" class="form-control neon-input text-center shadow-none" value="4" step="0.1">
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label">Height</label>
                        <input type="number" id="height" class="form-control neon-input text-center shadow-none" value="4" step="0.1">
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label">Depth</label>
                        <input type="number" id="depthRect" class="form-control neon-input text-center shadow-none" value="10" step="0.1">
                    </div>
                </div>
            </div>

            <div id="triangleInputs" style="display:none">
                <div class="d-flex flex-column gap-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label">Side A</label>
                        <input type="number" id="sideA" class="form-control neon-input text-center shadow-none" value="5" step="0.1">
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label">Side B</label>
                        <input type="number" id="sideB" class="form-control neon-input text-center shadow-none" value="6" step="0.1">
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label">Side C</label>
                        <input type="number" id="sideC" class="form-control neon-input text-center shadow-none" value="7" step="0.1">
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label">Depth</label>
                        <input type="number" id="depthTri" class="form-control neon-input text-center shadow-none" value="10" step="0.1">
                    </div>
                </div>
            </div>

            <div id="cylinderInputs" style="display:none">
                <div class="d-flex flex-column gap-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label">Radius</label>
                        <input type="number" id="radius" class="form-control neon-input text-center shadow-none" value="2" step="0.1">
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label">Depth</label>
                        <input type="number" id="depthCyl" class="form-control neon-input text-center shadow-none" value="10" step="0.1">
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center">
                <label class="form-label">Left Angle</label>
                <input type="number" id="alpha" class="form-control neon-input text-center shadow-none" value="60" step="1">
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <label class="form-label">Right Angle</label>
                <input type="number" id="beta" class="form-control neon-input text-center shadow-none" value="45" step="1">
            </div>

            <button id="updateBtn" class="btn btn-gradient mt-2 py-2">
                Update Mesh
            </button>

        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
